<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | Website Customization Form</title>
    <!-- Preload background image -->
    <link rel="preload" href="image-optimized.jpg" as="image" type="image/jpeg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #080c10;
            --primary-light: #0f1419;
            --accent: #c9a227;
            --accent-light: #d4b44a;
            --text: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --card-bg: rgba(255, 255, 255, 0.03);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--primary);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--primary) url('image-optimized.jpg') center/cover no-repeat;
            opacity: 0.15;
            z-index: -1;
            will-change: transform;
        }
        
        .success-container {
            text-align: center;
            max-width: 600px;
            padding: 60px 40px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            animation: scaleIn 0.5s ease;
        }
        
        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        .success-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, rgba(201, 162, 39, 0.2), rgba(201, 162, 39, 0.1));
            border-radius: 50%;
            margin-bottom: 32px;
        }
        
        .success-icon svg {
            color: var(--accent);
        }
        
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            color: var(--accent);
            margin-bottom: 20px;
        }
        
        p {
            color: var(--text);
            font-size: 1.2rem;
            margin-bottom: 12px;
            line-height: 1.6;
        }
        
        .subtext {
            color: var(--text-muted);
            font-size: 1rem;
            margin-bottom: 40px;
        }
        
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 16px 40px;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            color: var(--primary);
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 10px 40px rgba(201, 162, 39, 0.3);
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 50px rgba(201, 162, 39, 0.4);
        }
        
        .footer-watermark {
            margin-top: 60px;
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, rgba(201, 162, 39, 0.2), rgba(201, 162, 39, 0.08));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 8px;
        }
        
        @media (max-width: 768px) {
            .success-container {
                padding: 40px 24px;
            }
            
            .success-icon {
                width: 100px;
                height: 100px;
                margin-bottom: 24px;
            }
            
            .success-icon svg {
                width: 56px;
                height: 56px;
            }
            
            h1 {
                font-size: 2.25rem;
            }
            
            p {
                font-size: 1.1rem;
            }
            
            .subtext {
                font-size: 0.95rem;
            }
            
            .btn {
                width: 100%;
                justify-content: center;
            }
            
            .footer-watermark {
                font-size: 1.25rem;
                letter-spacing: 4px;
            }
        }
    </style>
</head>
<body>
    <div class="success-container">
        <div class="success-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="72" height="72" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                <polyline points="22 4 12 14.01 9 11.01"/>
            </svg>
        </div>
        
        <h1>Thank You!</h1>
        <p>Your information has been submitted successfully.</p>
        <p class="subtext">We will review your details and contact you soon to discuss your website project.</p>
        
        <a href="index.html" class="btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 12H5"/>
                <path d="m12 19-7-7 7-7"/>
            </svg>
            Back to Form
        </a>
        
        <div class="footer-watermark">DHANI MARKETING SERVICES</div>
    </div>
</body>
</html>
